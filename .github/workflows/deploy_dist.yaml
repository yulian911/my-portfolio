name: Deploy Dist folder

on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clean bad Windows lock artifacts
        run: |
          rm -rf node_modules
          rm -f package-lock.json
      - name: Cahe node modules
        uses: actions/cache@v4
        id: cache dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm install

      - name: Run test
        run: npm run test
  build:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clean bad Windows lock artifacts
        run: |
          rm -rf node_modules
          rm -f package-lock.json
      - name: Cahe node modules
        uses: actions/cache@v4
        id: cache dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm install

      - name: Build project
        run: npm run build
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: deploy dist folder
        run: echo "Deploying dist folder..."
